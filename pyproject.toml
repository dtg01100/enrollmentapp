[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enrollment"
version = "0.1.0"
description = "iOS supervision enrollment tool for Linux"
readme = "SPEC.md"
license = {text = "MIT"}
requires-python = ">=3.8"
dependencies = [
    "gradio>=4.0",
]

[project.scripts]
enrollment = "enroll:main"
enrollment-gui = "enroll_gui:main"

[project.optional-dependencies]
dev = [
    "ruff",
]
